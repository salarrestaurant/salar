<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENU</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 20px 0;
            font-size: 24px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 15px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>📷 MENU</header>

<div class="gallery">
    <img src="photo1.jpg" alt="الصورة 1">
    <img src="photo2.jpg" alt="الصورة 2">
    <img src="photo3.jpg" alt="الصورة 3">
    <img src="photo4.jpg" alt="الصورة 4">
    <img src="photo5.jpg" alt="الصورة 5">
    <img src="photo6.jpg" alt="الصورة 6">
    <img src="photo7.jpg" alt="الصورة 7">
    <img src="photo8.jpg" alt="الصورة 8">
    <img src="photo9.jpg" alt="الصورة 9">
    <img src="photo10.jpg" alt="الصورة 10">
    <img src="photo11.jpg" alt="الصورة 11">
    <img src="photo12.jpg" alt="الصورة 12">
    <img src="photo13.jpg" alt="الصورة 13">
    <img src="photo14.jpg" alt="الصورة 14">
    <img src="photo15.jpg" alt="الصورة 15">
    <img src="photo16.jpg" alt="الصورة 16">
    <img src="photo17.jpg" alt="الصورة 17">
    <img src="photo18.jpg" alt="الصورة 18">
    <img src="photo19.jpg" alt="الصورة 19">
</div>

</body>
</html>
